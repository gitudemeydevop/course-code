name: chekout
on: [push]

jobs:
    chekout-and-display-files:
        runs-on: ubuntu-latest
        steps:
            - name: list files before checkout
              run: ls -a
            - name: checkout
              run: |
                git init
                git remote add origin "https://$GITHUB_ACTOR:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" 
                git fetch
                git checkout main
            - name: list files after
              run: ls -a
