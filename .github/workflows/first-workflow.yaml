name: First Workflow
on: [push]


jobs:
    run-shell-commands:
        runs-on: ubuntu-latest
        steps:
            -   name: echo a string
                run: echo "Hello World"
            -   name: multiple commands
                run: |
                    node -v
                    npm -v

    parallel-job-macos:
        runs-on: macos-latest
        steps:
            - name: View SW Version 
              run: sw_vers
    dependent-job:
        runs-on: windows-latest
        needs: run-shell-commands
        steps:
            - name: echo a string 
              run : write-output "windows string"
            - name: error step
              run: doesnotexists


                