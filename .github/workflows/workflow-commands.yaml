name: Workflow Commands
on: [push]

jobs:
    testing-wf-commands:
        runs-on: ubuntu-latest
        steps:
            - name: setting an error message
              run: echo "::error::Missing a semicolon"
            - name: setting an error message with params
              run: echo "::error title=Error title ,file=app.js,line=2,endline=4,col=5,endcolum=7::Missing Semicolon"
            - name: setting an debug message
              run: echo "::debug title=Debug title ,file=app.js,line=2,endline=4,col=5,endcolum=7::Missing Semicolon"
            - name: setting an warning message with params
              run: echo "::warning title=Warning title ,file=app.js,line=2,endline=4,col=5,endcolum=7::Missing Semicolon"
            - name: setting an notice message with params
              run: echo"::notice title=Notice title ,file=app.js,line=2,endline=4,col=5,endcolum=7::Missing Semicolon"